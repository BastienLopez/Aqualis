name: Build APK

on:
  push:
    # Build automatique sur main → APK téléchargeable 30 jours dans Actions
    branches: [main]
    # Crée une GitHub Release avec l'APK attaché sur un tag vX.X.X
    tags:
      - 'v*'

permissions:
  contents: write   # nécessaire pour créer des Releases

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (mode capacitor)
        run: npm run build:capacitor

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "aqualis-*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK)" >> $GITHUB_OUTPUT
          echo "APK trouvé : $APK ($(du -sh $APK | cut -f1))"

      # ── Sur push main : artifact téléchargeable 30 jours ──────────────────
      - name: Upload APK artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: aqualis-debug-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # ── Sur tag v* : GitHub Release avec APK attaché ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          name: "Aqualis ${{ github.ref_name }}"
          body: |
            ## Aqualis ${{ github.ref_name }}

            ### Installer l'APK Android
            1. Télécharge `${{ steps.apk.outputs.name }}` ci-dessous
            2. Transfère sur ton téléphone Android
            3. Active **Sources inconnues** dans Paramètres → Sécurité
            4. Ouvre le fichier et installe

            > Build automatique via GitHub Actions · commit ${{ github.sha }}
