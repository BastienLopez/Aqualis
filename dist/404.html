<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Aqualis</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encode the requested path as a query param so index.html can restore it.
      // segmentCount = 1 for repos hosted at /RepoName/ (one path segment).
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
