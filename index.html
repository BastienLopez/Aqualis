<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile viewport: prevent zoom, fill notch, GPU-composited scroll -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Aqualis</title>

    <!-- PWA / Android WebView -->
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aqualis" />
    <!-- Prevent iOS callout/selection UI on long press (fish tap) -->
    <meta name="format-detection" content="telephone=no" />

    <!-- HTTP/2 push hints — load fonts before JS parses -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
